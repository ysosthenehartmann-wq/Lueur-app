# netlify.toml
#
# └ placer Ó la racine de ton projet Netlify (Ó c¶tķ de package.json).
# Redirige /api/xxx vers la fonction correspondante dans netlify/functions/xxx.js

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
